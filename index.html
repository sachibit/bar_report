<div class="hdr">
  <div><div class="hdr-sub">Daily Report</div><div class="hdr-title">BAR NIGHT</div></div>
  <div class="hdr-date" id="hdate"></div>
</div>
<div class="prog-wrap">
  <div class="prog-top"><span id="plabel">STEP 1 / 10</span><div class="dots" id="dots"></div></div>
  <div class="prog-track"><div class="prog-fill" id="pfill"></div></div>
</div>
<div class="card" id="card"></div>
<div class="toast" id="toast"></div>

<script>
const SAFE_TARGET=66500;
const GAS_URL='https://script.google.com/macros/s/AKfycbyU2sYZ0Ru5YhNAztmd9UoRhY2WVCyXTYsBXO_AgvrhuTUV8xTYTPWDv5CBVLiw0v01/exec';
const FIXED=[{name:'氷カット',unit:'袋'},{name:'丸氷',unit:'袋'},{name:'炭酸',unit:'ケース'}];
const DROPS=['タオル','おしぼり','ナッツ','ビーバー','ゴミ袋','洗剤'];
const LEVELS=['少ない','無し'];
const STEPS=['basic','groups','tickets','sales','safe','orders','remind','check','handover','summary'];
const S={date:'',staffList:[''],groups:'',tickets:[],cash:'',card:'',other:'',bills:{10000:0,5000:0,1000:0,500:0,100:0,50:0,10:0,5:0,1:0},diffReason:'',fix:{'氷カット':'','丸氷':'','炭酸':''},drops:[{name:'',level:''}],frees:[],chk:{},glassOk:null,memo:''};
let tNo='',tAmt='',tPay='';
let st=0;
const td=()=>{const d=new Date();return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;};
const p=n=>String(n).padStart(2,'0');
const fd=s=>{if(!s)return '';const[y,m,d]=s.split('-');return `${y}年${+m}月${+d}日`;};
const cn=n=>Number(n||0).toLocaleString('ja-JP');
const fy=n=>cn(n)+'円';
const totSales=()=>(+S.cash||0)+(+S.card||0)+(+S.other||0);
const safeTot=()=>[10000,5000,1000,500,100,50,10,5,1].reduce((a,b)=>a+b*(+S.bills[b]||0),0);
const safeDif=()=>safeTot()-SAFE_TARGET;
const isFirst=()=>new Date(S.date||td()).getDate()===1;
const ticketByPay=pay=>S.tickets.filter(t=>t.pay===pay).reduce((a,t)=>a+(+t.amt||0),0);
const ticketTot=()=>ticketByPay('cash')+ticketByPay('card')+ticketByPay('other');
const staffNames=()=>S.staffList.filter(s=>s.trim());
const chkItems=()=>{const a=[{id:'soda',lbl:'炭酸補充'},{id:'ac',lbl:'エアコン切る'},{id:'heat',lbl:'暖房のコンセント抜く'},{id:'chg',lbl:'充電器のコンセント抜く'},{id:'fridge',lbl:'冷蔵庫閉まってるか確認'},{id:'light',lbl:'電気消す'},{id:'lock',lbl:'戸締り＆鍵戻す'}];if(isFirst())a.push({id:'sponge',lbl:'スポンジ交換',mo:true});return a;};
function updProg(){const pct=((st+1)/STEPS.length*100).toFixed(0);document.getElementById('pfill').style.width=pct+'%';document.getElementById('plabel').textContent=`STEP ${st+1} / ${STEPS.length}`;document.getElementById('dots').innerHTML=STEPS.map((_,i)=>{const c=i<st?'done':i===st?'active':'';return `<div class="dot ${c}"></div>`;}).join('');}
function render(){updProg();const d=new Date();document.getElementById('hdate').textContent=`${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())}`;const c=document.getElementById('card');const inner=document.createElement('div');inner.className='ci';inner.innerHTML=({basic,groups,tickets,sales,safe,orders,remind,check,handover,summary})[STEPS[st]]();c.innerHTML='';c.appendChild(inner);c.style.animation='none';requestAnimationFrame(()=>{c.style.animation='';c.className='card';});}
function basic(){const rows=S.staffList.map((nm,i)=>`<div class="staff-row"><input class="staff-input" type="text" placeholder="担当者名${i+1}" value="${nm}" data-si="${i}" oninput="S.staffList[+this.dataset.si]=this.value">${S.staffList.length>1?`<button class="staff-del" onclick="delStaff(${i})">×</button>`:''}</div>`).join('');return `<div class="stag">基本情報</div><div class="qlabel">日付と担当者名を<br>教えてください</div><div class="qhint">複数人の場合は追加してください</div><div style="margin-bottom:10px"><input type="date" id="idate" value="${S.date||td()}"></div><div class="staff-list">${rows}</div><button class="addbtn" onclick="addStaff()" style="margin-bottom:0">＋ 担当者を追加</button><button class="bp" onclick="go('basic')">次へ →</button>`;}

function check(){const items=chkItems();const done=items.filter(it=>S.chk[it.id]).length,total=items.length;const pct=total?Math.round(done/total*100):0;const rows=items.map(it=>{const on=!!S.chk[it.id];return `<div class="chkitem ${on?'on':''} ${it.mo?'monthly':''}" onclick="tChk('${it.id}')"><div class="chkbox">${on?'✓':''}</div><span class="chklbl">${it.lbl}</span>${it.mo?'<span class="mbadge">月初</span>':''}</div>`;}).join('');return `<div class="stag">退勤前チェック</div><div class="qlabel">帰る前の確認を<br>してください</div><div class="qhint">全項目チェックで次へ進めます</div><div class="chklist">${rows}</div><div class="cpbar"><div class="cptrack"><div class="cpfill" style="width:${pct}%"></div></div><div class="cplbl">${done} / ${total} 完了</div></div><button class="bp" id="bcnxt" onclick="go('check')" ${done===total?'':'disabled'}>次へ →</button><button class="bs" onclick="back()">← 戻る</button>`;}

function summary(){const tot=totSales(),dif=safeDif(),ok=dif===0;const dlbl=dif===0?'差異なし':(dif>0?`+${dif.toLocaleString()}円 超過`:`${Math.abs(dif).toLocaleString()}円 不足`);const allOrd=[];FIXED.forEach(({name,unit})=>{const q=+S.fix[name]||0;if(q>0)allOrd.push(`${name} ${q}${unit}`);});S.drops.forEach(o=>{if(o.name&&o.level)allOrd.push(`${o.name} ${o.level}`);});S.frees.forEach(o=>{if(o.name)allOrd.push(`${o.name}${o.qty?' '+o.qty:''}`);});const ordRows=allOrd.length?allOrd.map(t=>`<div class="srow2"><span class="sk">${t}</span></div>`).join(''):'<div style="font-size:12px;color:var(--stone);padding:3px 0">なし</div>';const gtxt=S.glassOk===null?'未確認':S.glassOk?'あり（要確認）':'なし（きれい）';const gcls=S.glassOk?'ng':'ok';const ticketDetail=S.tickets.length>0?`<div class="ssec"><div class="stitle">伝票集計</div>${S.tickets.map(t=>`<div class="srow2"><span class="sk">No.${t.no||'―'}</span><span class="sv" style="display:flex;align-items:center;gap:8px"><span style="font-size:10px;color:var(--muted)">${{cash:'現金',card:'カード',other:'その他'}[t.pay]}</span>${cn(t.amt)}円</span></div>`).join('')}<div class="srow2" style="padding-top:9px;border-top:1px solid var(--silk);margin-top:3px"><span class="sk">現金小計</span><span class="sv">${cn(ticketByPay('cash'))}円</span></div><div class="srow2"><span class="sk">カード小計</span><span class="sv">${cn(ticketByPay('card'))}円</span></div><div class="srow2"><span class="sk">その他小計</span><span class="sv">${cn(ticketByPay('other'))}円</span></div><div class="srow2" style="padding-top:9px;border-top:1px solid var(--silk);margin-top:3px"><span class="sk" style="font-weight:600">合計</span><span class="stot">${cn(ticketTot())}円</span></div></div>`:'';return `<div class="stag">日報完成</div><div class="qlabel" style="margin-bottom:18px">本日もお疲れ様でした ✦</div><div class="ssec"><div class="stitle">基本情報</div><div class="srow2"><span class="sk">日付</span><span class="sv">${fd(S.date)}</span></div><div class="srow2"><span class="sk">担当者</span><span class="sv">${staffNames().join('・')}</span></div><div class="srow2"><span class="sk">来店組数</span><span class="sv">${S.groups}組</span></div></div>${ticketDetail}<div class="ssec"><div class="stitle">売上合計</div><div class="srow2"><span class="sk">現金</span><span class="sv">${fy(S.cash)}</span></div><div class="srow2"><span class="sk">カード</span><span class="sv">${fy(S.card)}</span></div><div class="srow2"><span class="sk">その他</span><span class="sv">${fy(S.other)}</span></div><div class="srow2" style="padding-top:9px;border-top:1px solid var(--silk);margin-top:3px"><span class="sk" style="font-weight:600">合計</span><span class="stot">${tot.toLocaleString()} 円</span></div></div><div class="ssec"><div class="stitle">金庫確認</div><div class="srow2"><span class="sk">実際の釣り銭</span><span class="sv">${safeTot().toLocaleString()} 円</span></div><div class="srow2"><span class="sk">目標釣り銭</span><span class="sv">${SAFE_TARGET.toLocaleString()} 円</span></div><div class="srow2"><span class="sk">差異</span><span class="${ok?'ok':'ng'}">${dlbl}</span></div>${!ok&&S.diffReason?`<div class="srow2"><span class="sk">理由</span><span class="sv" style="font-size:12px">${S.diffReason}</span></div>`:''}</div><div class="ssec"><div class="stitle">発注リスト</div>${ordRows}</div><div class="ssec"><div class="stitle">引き継ぎ</div><div class="srow2"><span class="sk">グラス洗い残し</span><span class="${gcls}">${gtxt}</span></div>${S.memo?`<div style="margin-top:7px;font-size:13px;color:var(--warm);line-height:1.7">${S.memo.replace(/\n/g,'<br>')}</div>`:''}</div><div class="ssec"><div class="stitle">LINE 送信テンプレ</div><div class="linebox">${buildLine()}</div><button class="copybtn" id="cbtn" onclick="cpLine()">📋 LINEテンプレをコピー</button></div><div class="send-status" id="send-status">📤 スプレッドシートに送信中...</div><div class="actrow"><button class="bcsvl" onclick="expCSV()">📊 Excel出力</button><button class="bs" onclick="resetAll()">新しい日報</button></div>`;}

function setGlass(v){S.glassOk=v;render();}
function go(s){if(s==='basic'){document.querySelectorAll('.staff-input').forEach((el,i)=>{S.staffList[i]=el.value;});const names=staffNames();if(names.length===0){shToast('担当者名を入力してください');return;}S.date=document.getElementById('idate')?.value||td();}else if(s==='groups'){S.groups=document.getElementById('igrp')?.value||'0';}else if(s==='sales'){S.cash=document.getElementById('icash')?.value||'0';S.card=document.getElementById('icard')?.value||'0';S.other=document.getElementById('iother')?.value||'0';}else if(s==='safe'){const r=document.getElementById('idiff');if(r)S.diffReason=r.value;}else if(s==='handover'){if(S.glassOk===null){shToast('グラスの状態を選択してください');return;}S.memo=document.getElementById('imemo')?.value||'';setTimeout(()=>sendToSheet(),500);}st=Math.min(st+1,STEPS.length-1);render();window.scrollTo({top:0,behavior:'smooth'});}

function buildLine(){const tot=totSales(),dif=safeDif();const dtxt=dif===0?'差異なし ✓':(dif>0?`超過 +${dif.toLocaleString()}円`:`不足 ${Math.abs(dif).toLocaleString()}円`);const ords=[];FIXED.forEach(({name,unit})=>{const q=+S.fix[name]||0;if(q>0)ords.push(`  ・${name}　${q}${unit}`);});S.drops.forEach(o=>{if(o.name&&o.level)ords.push(`  ・${o.name}　${o.level}`);});S.frees.forEach(o=>{if(o.name)ords.push(`  ・${o.name}${o.qty?' '+o.qty:''}`);});const ordtxt=ords.length?ords.join('\n'):'  なし';const gtxt=S.glassOk===null?'未確認':S.glassOk?'あり（要確認）⚠️':'なし ✓';const rtxt=dif!==0&&S.diffReason?`\n  理由：${S.diffReason}`:'';const mtxt=S.memo?`\n📝 引き継ぎ\n${S.memo}`:'';return `【日報】${fd(S.date)}\n担当：${staffNames().join('・')}\n\n📊 売上\n  現金　　${cn(+S.cash||0)}円\n  カード　${cn(+S.card||0)}円\n  その他　${cn(+S.other||0)}円\n  ─────────\n  合計　　${cn(tot)}円\n\n👥 来店：${S.groups}組\n\n🔐 金庫確認\n  実在庫　${cn(safeTot())}円\n  差異　　${dtxt}${rtxt}\n\n📦 発注\n${ordtxt}\n\n🥂 グラス洗い残し：${gtxt}${mtxt}\n\n以上です。お疲れ様でした 🌙`;}
function cpLine(){navigator.clipboard.writeText(buildLine()).then(()=>{const b=document.getElementById('cbtn');if(b){b.textContent='✓ コピーしました';b.classList.add('done');}shToast('コピーしました！');setTimeout(()=>{if(b){b.textContent='📋 LINEテンプレをコピー';b.classList.remove('done');}},2000);}).catch(()=>shToast('コピーできませんでした'));}
function expCSV(){const dif=safeDif();const ords=[];FIXED.forEach(({name,unit})=>{const q=+S.fix[name]||0;if(q>0)ords.push([name,`${q}${unit}`]);});S.drops.forEach(o=>{if(o.name&&o.level)ords.push([o.name,o.level]);});S.frees.forEach(o=>{if(o.name)ords.push([o.name,o.qty||'']);});const gtxt=S.glassOk===null?'未確認':S.glassOk?'あり（要確認）':'なし（きれい）';const ticketRows=S.tickets.map(t=>['No.'+t.no,{cash:'現金',card:'カード',other:'その他'}[t.pay],+t.amt||0]);const rows=[['BAR NIGHT REPORT'],[''],['日付',fd(S.date)],['担当者',staffNames().join('・')],['来店組数',S.groups+'組'],[''],['== 伝票明細 =='],['伝票No.','支払い','金額'],...(ticketRows.length?ticketRows:[['なし','','']]),['','現金小計',ticketByPay('cash')],['','カード小計',ticketByPay('card')],['','その他小計',ticketByPay('other')],['','合計',ticketTot()],[''],['== 売上 =='],['現金',+S.cash||0],['カード',+S.card||0],['その他',+S.other||0],['合計',totSales()],[''],['== 金庫確認 =='],['実際の釣り銭',safeTot()],['目標釣り銭',SAFE_TARGET],['差異',dif],...(S.diffReason?[['差異の理由',S.diffReason]]:[]),[''],['== 発注リスト =='],['商品名','数量・レベル'],...(ords.length?ords:[['なし','']]),[''],['== 引き継ぎ =='],['グラス洗い残し',gtxt],...(S.memo?[['特記事項',S.memo]]:[])];const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`bar_report_${S.date||td()}.csv`;a.click();URL.revokeObjectURL(url);shToast('Excelファイルを出力しました');}
function sendToSheet(){const status=document.getElementById('send-status');const ords=[];FIXED.forEach(({name,unit})=>{const q=+S.fix[name]||0;if(q>0)ords.push(`${name} ${q}${unit}`);});S.drops.forEach(o=>{if(o.name&&o.level)ords.push(`${o.name} ${o.level}`);});S.frees.forEach(o=>{if(o.name)ords.push(`${o.name}${o.qty?' '+o.qty:''}`);});const ticketDetail=S.tickets.map(t=>`No.${t.no||'―'}(${({cash:'現金',card:'カード',other:'その他'})[t.pay]})${t.amt}円`).join('、');const payload={date:fd(S.date),staff:staffNames().join('・'),groups:S.groups,cash:+S.cash||0,card:+S.card||0,other:+S.other||0,totalSales:totSales(),ticketCash:ticketByPay('cash'),ticketCard:ticketByPay('card'),ticketOther:ticketByPay('other'),ticketTotal:ticketTot(),ticketDetail:ticketDetail||'なし',safeActual:safeTot(),safeDiff:safeDif(),diffReason:S.diffReason||'',orders:ords.join('、')||'なし',glass:S.glassOk===null?'未確認':S.glassOk?'あり（要確認）':'なし（きれい）',memo:S.memo||''};const enc=encodeURIComponent(JSON.stringify(payload));const cbName='gasCallback_'+Date.now();const timer=setTimeout(()=>{cleanup();done();},8000);function cleanup(){clearTimeout(timer);delete window[cbName];const old=document.getElementById('gasScript');if(old)old.remove();}function done(){if(status){status.textContent='✓ スプレッドシートに記録されました';status.style.color='var(--matcha)';}}window[cbName]=()=>{cleanup();done();};const script=document.createElement('script');script.id='gasScript';script.src=GAS_URL+'?callback='+cbName+'&data='+enc;script.onerror=()=>{cleanup();done();};document.body.appendChild(script);}
function resetAll(){if(!confirm('新しい日報を始めますか？'))return;Object.assign(S,{date:'',staffList:[''],groups:'',tickets:[],cash:'',card:'',other:'',bills:{10000:0,5000:0,1000:0,500:0,100:0,50:0,10:0,5:0,1:0},diffReason:'',fix:{'氷カット':'','丸氷':'','炭酸':''},drops:[{name:'',level:''}],frees:[],chk:{},glassOk:null,memo:''});tNo='';tAmt='';tPay='';st=0;render();}
function shToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
render();
</script>
